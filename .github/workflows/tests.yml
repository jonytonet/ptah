name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11.*', '12.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          # Laravel 13 (Testbench 11) — runs on PHP 8.4 only.
          - laravel: '13.*'
            testbench: '11.*'
            php: '8.4'

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite, gd, zip
          coverage: none

      # Authenticate Composer with the auto-provided token so the dependency
      # downloads don't hit GitHub's 60 req/h unauthenticated rate limit.
      - name: Configure Composer GitHub auth
        run: composer config --global github-oauth.github.com "${{ secrets.GITHUB_TOKEN }}"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
