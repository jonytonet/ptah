services:

  # ─── PHP-FPM + Node.js ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ${APP_NAME:-ptah}_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer
    networks:
      - app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PHP_OPCACHE_ENABLE: 0

  # ─── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-ptah}_nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    depends_on:
      - app

  # ─── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ${APP_NAME:-ptah}_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT_HOST:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-ptah}_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT_HOST:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app

  # ─── Mailpit (captura e-mails de desenvolvimento) ──────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${APP_NAME:-ptah}_mailpit
    ports:
      - "${MAIL_UI_PORT:-8025}:8025"    # Web UI: http://localhost:8025
      - "${MAIL_SMTP_PORT:-1025}:1025"  # SMTP
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  composer_cache:
